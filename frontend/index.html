<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 解决方案生成器 | YuniTech</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  
  <div class="container">
    <!-- 语言选择器 -->
    <div class="lang-selector">
      <select id="langSelect">
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="en">English</option>
      </select>
    </div>

    <header>
      <div class="logo">
        <img src="/logo.png" alt="YuniTech" class="logo-img">
      </div>
      <h1 data-i18n="title">AI 解决方案生成器</h1>
      <p class="subtitle" data-i18n="subtitle">描述您的业务痛点，AI 为您定制专属技术方案</p>
    </header>

    <main class="glass-card">
      <div class="input-section">
        <div class="textarea-wrapper">
          <textarea 
            id="painPointInput" 
            placeholder="例如：我经营一家连锁餐厅，每天排队等位时间长，顾客流失严重，需要一个智能排队和预约系统..."
            rows="4"
          ></textarea>
        </div>
        
        <button id="matchBtn" class="primary-btn">
          <span class="btn-text" data-i18n="generateBtn">生成解决方案</span>
          <span class="btn-icon">→</span>
        </button>
      </div>

      <div id="loading" class="loading" style="display: none;">
        <div class="loader">
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
        </div>
        <p class="loading-text"><span data-i18n="loading">AI 正在分析您的需求</span><span class="dots"></span></p>
      </div>

      <div id="results" class="results-section"></div>
    </main>

    <footer>
      <div class="footer-tags" id="footerTags">
        <span>零售</span><span>餐饮</span><span>物流</span><span>医疗</span><span>教育</span>
        <span>金融</span><span>美容</span><span>酒店</span><span>制造</span><span data-i18n="more">更多</span>
      </div>
      <p class="copyright">Powered by Yuni Tech Limited</p>
    </footer>
  </div>

  <!-- Facebook 关注弹窗 -->
  <div id="fbModal" class="fb-modal" style="display:none;">
    <div class="fb-modal-backdrop"></div>
    <div class="fb-modal-content">
      <h3 id="fbModalTitle"></h3>
      <p id="fbModalDesc"></p>
      <div class="fb-qr-wrapper">
        <img id="fbQrCode" src="" alt="Facebook QR Code" class="fb-qr-img">
      </div>
      <a href="https://www.facebook.com/yuniaifreelance" target="_blank" rel="noopener" class="fb-link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        YuniTech Freelance
      </a>
      <div class="fb-modal-actions">
        <button id="fbConfirmBtn" class="primary-btn fb-confirm-btn"></button>
        <button id="fbSkipBtn" class="fb-skip-btn"></button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>

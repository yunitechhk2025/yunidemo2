<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 解决方案生成器 | YuniTech</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  
  <div class="container">
    <header>
      <div class="logo">
        <img src="/logo.png" alt="YuniTech" class="logo-img">
      </div>
      <h1>AI 解决方案生成器</h1>
      <p class="subtitle">描述您的业务痛点，AI 为您定制专属技术方案</p>
    </header>

    <main class="glass-card">
      <div class="input-section">
        <div class="textarea-wrapper">
          <textarea 
            id="painPointInput" 
            placeholder="例如：我经营一家连锁餐厅，每天排队等位时间长，顾客流失严重，需要一个智能排队和预约系统..."
            rows="4"
          ></textarea>
        </div>
        
        <button id="matchBtn" class="primary-btn">
          <span class="btn-text">生成解决方案</span>
          <span class="btn-icon">→</span>
        </button>
      </div>

      <div id="loading" class="loading" style="display: none;">
        <div class="loader">
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
        </div>
        <p class="loading-text"><span>AI 正在分析您的需求</span><span class="dots"></span></p>
      </div>

      <div id="results" class="results-section"></div>
    </main>

    <footer>
      <div class="footer-tags">
        <span>零售</span><span>餐饮</span><span>物流</span><span>医疗</span><span>教育</span>
        <span>金融</span><span>美容</span><span>酒店</span><span>制造</span><span>更多</span>
      </div>
      <p class="copyright">Powered by Yuni Tech Limited</p>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
